title: Open WebUI File Detection
id: 12345678-1234-5678-9abc-123456789038
status: experimental
description: >
  Detects Open WebUI file system activity. Open WebUI is typically deployed
  via Docker or installed as a Python package. Detection targets Docker
  volume paths and Python site-packages locations.
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.persistence
  - attack.t1547
  - ai.framework
  - ai.shadow_ai
logsource:
  category: file_event
  product: any
detection:
  selection_docker_volumes:
    TargetFilename|contains:
      - '/open-webui/data'
      - '/open-webui/backend'
  selection_python_package:
    TargetFilename|contains:
      - 'site-packages/open_webui'
      - 'site-packages\\open_webui'
  selection_config:
    TargetFilename|contains:
      - '.open-webui'
      - '/open-webui/'
      - '\\open-webui\\'
  condition: selection_docker_volumes or selection_python_package or selection_config
fields:
  - TargetFilename
  - ProcessName
  - User
falsepositives:
  - Legitimate Open WebUI installation
  - Development environments
level: medium
