title: Jan AI LLM Software Detection
id: 12345678-1234-5678-9abc-123456789046
status: experimental
description: >
  Detects Jan AI desktop application installation and usage. Jan is a desktop
  Electron app with the real process name Jan.exe (Windows) or Jan (macOS/Linux).
  WARNING: Generic 'jan' string matching is extremely overbroad and will match
  words like January, janitor, etc. This rule uses specific process names and
  path patterns to reduce false positives.
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.execution
  - attack.t1059
  - attack.t1071.001
  - ai.framework
  - ai.shadow_ai
logsource:
  category: process_creation
  product: any
detection:
  selection_windows:
    Image|endswith:
      - '\Jan.exe'
  selection_commandline:
    CommandLine|contains:
      - 'Jan.exe'
      - 'jan-ai'
      - '/jan/Jan'
  selection_path:
    Image|contains:
      - '\jan\Jan.exe'
      - '/Applications/Jan.app'
  condition: selection_windows or selection_commandline or selection_path
fields:
  - Image
  - CommandLine
  - ProcessId
  - User
  - ParentImage
  - ParentCommandLine
falsepositives:
  - Legitimate Jan AI usage
  - Other applications with Jan in the path
  - Usernames containing Jan
level: medium
