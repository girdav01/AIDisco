title: LibreChat File Detection
id: 12345678-1234-5678-9abc-123456789044
status: experimental
description: >
  Detects LibreChat file system activity. LibreChat is deployed via Docker
  or cloned as a Node.js project. Detection targets project directories
  and configuration files.
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.persistence
  - attack.t1547
  - ai.framework
  - ai.shadow_ai
logsource:
  category: file_event
  product: any
detection:
  selection_project_dir:
    TargetFilename|contains:
      - '/LibreChat/'
      - '\\LibreChat\\'
      - '/librechat/'
      - '\\librechat\\'
  selection_config:
    TargetFilename|endswith:
      - 'librechat.yaml'
      - 'librechat.yml'
  condition: selection_project_dir or selection_config
fields:
  - TargetFilename
  - ProcessName
  - User
falsepositives:
  - Legitimate LibreChat installation
  - Development environments
level: medium
