title: LocalAI File Detection
id: 12345678-1234-5678-9abc-123456789053
status: experimental
description: >
  Detects LocalAI file system activity. LocalAI stores configuration and
  models in its working directory. Detection targets the LocalAI project
  directory structure and its models subdirectory.
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.persistence
  - attack.t1547
  - ai.framework
  - ai.shadow_ai
logsource:
  category: file_event
  product: any
detection:
  selection_project_dir:
    TargetFilename|contains:
      - '/LocalAI/'
      - '\\LocalAI\\'
      - '/local-ai/'
      - '\\local-ai\\'
  selection_models:
    TargetFilename|contains:
      - 'local-ai/models'
      - 'local-ai\\models'
      - 'LocalAI/models'
      - 'LocalAI\\models'
  condition: selection_project_dir or selection_models
fields:
  - TargetFilename
  - ProcessName
  - User
falsepositives:
  - Legitimate LocalAI installation
  - Development environments
level: medium
