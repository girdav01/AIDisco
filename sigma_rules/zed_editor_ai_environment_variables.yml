title: Zed Editor AI Environment Variables
id: 12345678-1234-5678-9abc-123456789015
status: experimental
description: Detects Zed editor AI-related environment variable usage on command line. Zed is available on macOS and Linux only.
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.discovery
  - attack.t1082
  - ai.framework
  - ai.shadow_ai
logsource:
  category: process_creation
  product: any
detection:
  selection_cmdline:
    CommandLine|contains:
      - 'ZED_'
  condition: selection_cmdline
fields:
  - Image
  - CommandLine
  - User
falsepositives:
  - Legitimate Zed editor configuration
  - Development environment setup
level: low
