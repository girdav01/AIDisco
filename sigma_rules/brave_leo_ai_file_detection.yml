title: Brave Leo AI File Detection
id: 12345678-1234-5678-9abc-123456789029
status: experimental
description: Detects Brave browser file system activity related to Leo AI features. Leo is built into the Brave browser.
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.persistence
  - attack.t1547
  - ai.framework
  - ai.shadow_ai
logsource:
  category: file_event
  product: any
detection:
  selection_paths:
    TargetFilename|contains:
      - '\BraveSoftware\Brave-Browser'
      - '/BraveSoftware/Brave-Browser'
      - '\AppData\Local\BraveSoftware'
      - 'brave-browser'
  condition: selection_paths
fields:
  - TargetFilename
  - ProcessName
  - User
falsepositives:
  - Legitimate Brave browser usage
  - Browser profile backups
level: medium
