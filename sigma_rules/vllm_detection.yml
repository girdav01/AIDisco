title: vLLM LLM Software Detection
id: 12345678-1234-5678-9abc-123456789079
status: experimental
description: |
  Detects vLLM inference engine processes and commands. vLLM is a high-throughput
  LLM serving engine installed as a Python package (pip install vllm). It is
  primarily used on Linux with NVIDIA GPUs. It provides an OpenAI-compatible API
  server on port 8000 by default. vLLM has no standalone binaries - it runs as
  a Python module or via the 'vllm serve' CLI entry point. It does not create
  application directories or config files outside of Python's site-packages.
author: AI Discovery Security Team
date: 2024/08/30
modified: 2026/02/10
tags:
  - attack.execution
  - attack.t1059
  - attack.t1082
  - ai.framework
  - ai.shadow_ai
references:
  - https://vllm.ai/
  - https://github.com/vllm-project/vllm
logsource:
  category: process_creation
  product: any
detection:
  selection_vllm_cli:
    CommandLine|contains:
      - 'vllm serve'
      - 'vllm.entrypoints'
  selection_python_module:
    CommandLine|contains|all:
      - 'python'
      - '-m vllm'
  selection_pip_install:
    CommandLine|contains|all:
      - 'pip'
      - 'install'
      - 'vllm'
  condition: selection_vllm_cli or selection_python_module or selection_pip_install
falsepositives:
  - Legitimate use of vLLM for authorized AI model serving
  - IT-approved LLM inference deployments
level: medium
fields:
  - Image
  - CommandLine
  - User
  - ParentImage
