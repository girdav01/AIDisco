title: Zed Editor AI LLM Software Detection
id: 12345678-1234-5678-9abc-123456789013
status: experimental
description: Detects Zed editor with built-in AI assistant (Anthropic/OpenAI APIs). Zed is available on macOS and Linux only - no Windows version exists.
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.execution
  - attack.t1059
  - attack.t1071.001
  - ai.framework
  - ai.shadow_ai
logsource:
  category: process_creation
  product: any
detection:
  selection_image:
    Image|endswith:
      - '/zed'
      - '/Zed'
  selection_cmdline:
    CommandLine|contains:
      - 'Zed.app'
      - '/zed'
  condition: selection_image or selection_cmdline
fields:
  - Image
  - CommandLine
  - ProcessId
  - User
  - ParentImage
  - ParentCommandLine
falsepositives:
  - Legitimate Zed editor usage
  - Development environments
level: medium
