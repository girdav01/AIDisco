title: Ollama LLM Software Detection
id: 12345678-1234-5678-9abc-123456789076
status: experimental
description: |
  Detects Ollama Large Language Model software processes and commands. Ollama runs
  local LLMs on Windows, macOS, and Linux, providing a REST API on port 11434.
  It supports running, pulling, and managing models locally without cloud dependencies.
  Ollama stores models in ~/.ollama/models (Linux/macOS) or %USERPROFILE%\.ollama\models
  (Windows), and configuration in ~/.ollama (or %LOCALAPPDATA%\Ollama on Windows).
author: AI Discovery Security Team
date: 2024/08/30
modified: 2026/02/10
tags:
  - attack.execution
  - attack.t1059
  - attack.t1082
  - ai.framework
  - ai.shadow_ai
references:
  - https://ollama.com/
  - https://github.com/ollama/ollama
logsource:
  category: process_creation
  product: any
detection:
  selection_process:
    Image|endswith:
      - '\ollama.exe'
      - '/ollama'
  selection_commands:
    CommandLine|contains:
      - 'ollama serve'
      - 'ollama run'
      - 'ollama pull'
      - 'ollama list'
      - 'ollama show'
      - 'ollama create'
      - 'ollama push'
      - 'ollama ps'
      - 'ollama cp'
      - 'ollama rm'
      - 'ollama start'
      - 'ollama stop'
  condition: selection_process or selection_commands
falsepositives:
  - Legitimate use of Ollama for authorized AI development
  - IT-approved local LLM deployments
level: medium
fields:
  - Image
  - CommandLine
  - User
  - ParentImage
