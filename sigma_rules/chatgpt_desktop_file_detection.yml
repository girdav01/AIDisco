title: ChatGPT Desktop File Detection
id: 12345678-1234-5678-9abc-123456789020
status: experimental
description: Detects ChatGPT desktop file system activity on Windows and macOS
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.persistence
  - attack.t1547
  - ai.framework
  - ai.shadow_ai
logsource:
  category: file_event
  product: any
detection:
  selection_windows_install:
    TargetFilename|contains:
      - '\Programs\ChatGPT'
      - '\Packages\OpenAI'
      - '\AppData\Local\ChatGPT'
  selection_macos:
    TargetFilename|contains:
      - '/Applications/ChatGPT.app'
      - '/Library/Application Support/ChatGPT'
  condition: selection_windows_install or selection_macos
fields:
  - TargetFilename
  - ProcessName
  - User
falsepositives:
  - Legitimate ChatGPT desktop installation
  - Development tool updates
level: medium
