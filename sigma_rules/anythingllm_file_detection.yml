title: AnythingLLM File Detection
id: 12345678-1234-5678-9abc-123456789041
status: experimental
description: >
  Detects AnythingLLM file system activity. AnythingLLM desktop stores data
  in platform-specific application data directories. Docker deployments use
  mounted volumes for storage.
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.persistence
  - attack.t1547
  - ai.framework
  - ai.shadow_ai
logsource:
  category: file_event
  product: any
detection:
  selection_windows:
    TargetFilename|contains:
      - '\AppData\Roaming\anythingllm-desktop'
      - '\anythingllm-desktop\'
  selection_macos:
    TargetFilename|contains:
      - '/Library/Application Support/anythingllm-desktop'
  selection_linux:
    TargetFilename|contains:
      - '/.config/anythingllm'
  condition: selection_windows or selection_macos or selection_linux
fields:
  - TargetFilename
  - ProcessName
  - User
falsepositives:
  - Legitimate AnythingLLM installation
  - Development environments
level: medium
