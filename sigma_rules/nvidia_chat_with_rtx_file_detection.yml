title: NVIDIA ChatRTX (formerly Chat with RTX) File Detection
id: 12345678-1234-5678-9abc-123456789062
status: experimental
description: |
  Detects NVIDIA ChatRTX file system artifacts. ChatRTX installs to
  C:\Program Files\NVIDIA\ChatRTX (or ChatWithRTX for older versions).
  Deprecated by NVIDIA in January 2026.
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.persistence
  - attack.t1082
  - ai.framework
  - ai.shadow_ai
logsource:
  category: file_event
  product: windows
detection:
  selection_chatrtx:
    TargetFilename|contains:
      - '\NVIDIA\ChatRTX'
      - '\NVIDIA\ChatWithRTX'
      - '\Program Files\NVIDIA\ChatRTX'
      - '\Program Files\NVIDIA\ChatWithRTX'
  selection_appdata:
    TargetFilename|contains:
      - '\AppData\Local\NVIDIA\ChatRTX'
  condition: selection_chatrtx or selection_appdata
falsepositives:
  - Legitimate NVIDIA ChatRTX installation
level: medium
fields:
  - TargetFilename
  - ProcessName
  - User
