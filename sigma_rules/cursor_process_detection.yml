title: Cursor AI Code Editor Process Detection
id: 12345678-1234-5678-9abc-123456789004
status: experimental
description: Detects Cursor AI-powered code editor process execution. Cursor is a VS Code fork available on Windows, macOS, and Linux.
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.execution
  - attack.t1059
  - attack.t1071.001
  - ai.framework
  - ai.shadow_ai
logsource:
  category: process_creation
  product: any
detection:
  selection_image:
    Image|endswith:
      - '\Cursor.exe'
      - '/Cursor'
      - '/cursor'
  selection_cmdline:
    CommandLine|contains:
      - 'Cursor.exe'
      - 'Cursor.app'
      - '/cursor'
  condition: selection_image or selection_cmdline
fields:
  - Image
  - CommandLine
  - ProcessId
  - User
  - ParentImage
  - ParentCommandLine
falsepositives:
  - Legitimate Cursor code editor usage
  - Development environments
  - AI-assisted coding sessions
level: medium
