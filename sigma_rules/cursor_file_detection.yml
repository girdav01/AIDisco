title: Cursor AI Code Editor File Detection
id: 12345678-1234-5678-9abc-123456789005
status: experimental
description: Detects Cursor AI-powered code editor file system activity and configuration.
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.persistence
  - attack.t1547
  - ai.framework
  - ai.shadow_ai
logsource:
  category: file_event
  product: any
detection:
  selection_paths:
    TargetFilename|contains:
      - '\AppData\Local\Programs\Cursor'
      - '\AppData\Roaming\Cursor'
      - '/.config/Cursor'
      - '/Applications/Cursor.app'
      - '\.cursor'
  condition: selection_paths
fields:
  - TargetFilename
  - ProcessName
  - User
falsepositives:
  - Legitimate Cursor installation and configuration
  - Development environment setup
  - AI coding assistant configuration
level: medium
