title: Brave Leo AI LLM Software Detection
id: 12345678-1234-5678-9abc-123456789028
status: experimental
description: Detects Brave browser with built-in Leo AI assistant. Leo is integrated into the Brave browser and has no standalone process.
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.execution
  - attack.t1059
  - attack.t1071.001
  - ai.framework
  - ai.shadow_ai
logsource:
  category: process_creation
  product: any
detection:
  selection_image:
    Image|endswith:
      - '\brave.exe'
      - '/brave'
      - '/Brave Browser'
  selection_cmdline:
    CommandLine|contains:
      - 'brave.exe'
      - 'Brave Browser'
      - 'brave-browser'
  condition: selection_image or selection_cmdline
fields:
  - Image
  - CommandLine
  - ProcessId
  - User
  - ParentImage
  - ParentCommandLine
falsepositives:
  - Legitimate Brave browser usage without Leo AI features
  - General web browsing
level: medium
