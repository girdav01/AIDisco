title: Windsurf AI Code Editor Environment Detection
id: 12345678-1234-5678-9abc-123456789069
status: experimental
description: |
  Detects commands referencing Windsurf or Codeium environment variables.
  Codeium uses CODEIUM_ prefixed environment variables for API configuration.
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.discovery
  - attack.t1082
  - ai.framework
  - ai.shadow_ai
logsource:
  category: process_creation
  product: any
detection:
  selection_commands:
    CommandLine|contains:
      - 'CODEIUM_API'
      - 'CODEIUM_TOKEN'
      - 'WINDSURF_'
  condition: selection_commands
falsepositives:
  - Legitimate Codeium/Windsurf development configuration
level: low
fields:
  - Image
  - CommandLine
  - User
