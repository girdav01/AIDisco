title: Tabnine AI Environment Variables
id: 12345678-1234-5678-9abc-123456789012
status: experimental
description: Detects Tabnine AI environment variable configuration on command line.
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.discovery
  - attack.t1082
  - ai.framework
  - ai.shadow_ai
logsource:
  category: process_creation
  product: any
detection:
  selection_cmdline:
    CommandLine|contains:
      - 'TABNINE_'
  condition: selection_cmdline
fields:
  - Image
  - CommandLine
  - User
falsepositives:
  - Legitimate Tabnine AI configuration
  - Development environment setup
level: low
