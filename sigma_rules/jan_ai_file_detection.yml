title: Jan AI File Detection
id: 12345678-1234-5678-9abc-123456789047
status: experimental
description: >
  Detects Jan AI file system activity. Jan stores data in platform-specific
  application data directories. Detection targets the known Jan data
  directories on Windows, macOS, and Linux.
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.persistence
  - attack.t1547
  - ai.framework
  - ai.shadow_ai
logsource:
  category: file_event
  product: any
detection:
  selection_windows:
    TargetFilename|contains:
      - '\AppData\Roaming\jan'
      - '\AppData\Local\jan'
  selection_macos:
    TargetFilename|contains:
      - '/Library/Application Support/jan'
  selection_linux:
    TargetFilename|contains:
      - '/.config/jan'
  condition: selection_windows or selection_macos or selection_linux
fields:
  - TargetFilename
  - ProcessName
  - User
falsepositives:
  - Legitimate Jan AI installation
  - Other applications using directories named jan
level: medium
