title: YouChat/You.com AI File Detection
id: 12345678-1234-5678-9abc-123456789035
status: experimental
description: Detects You.com AI API client and SDK configuration file activity (no standalone desktop app exists)
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.persistence
  - attack.t1547
  - ai.framework
  - ai.shadow_ai
logsource:
  category: file_event
  product: any
detection:
  selection_sdk:
    TargetFilename|contains:
      - 'you-com-api'
      - 'youdotcom'
  condition: selection_sdk
fields:
  - TargetFilename
  - ProcessName
  - User
falsepositives:
  - Legitimate You.com API client installation
  - Development tool updates
level: medium
