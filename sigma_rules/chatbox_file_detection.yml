title: Chatbox AI Chat Application File Detection
id: 12345678-1234-5678-9abc-123456789008
status: experimental
description: Detects Chatbox AI desktop chat client file system activity and configuration.
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.persistence
  - attack.t1547
  - ai.framework
  - ai.shadow_ai
logsource:
  category: file_event
  product: any
detection:
  selection_paths:
    TargetFilename|contains:
      - '\AppData\Roaming\chatbox'
      - '\AppData\Local\chatbox'
      - '/.config/chatbox'
      - '\Chatbox\'
  condition: selection_paths
fields:
  - TargetFilename
  - ProcessName
  - User
falsepositives:
  - Legitimate Chatbox installation and configuration
  - AI chat application setup
level: medium
