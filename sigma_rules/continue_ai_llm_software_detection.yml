title: Continue AI LLM Software Detection
id: 12345678-1234-5678-9abc-123456789016
status: experimental
description: Detects Continue AI coding assistant. Continue is a VS Code/JetBrains extension and does not have a standalone executable.
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.execution
  - attack.t1059
  - attack.t1071.001
  - ai.framework
  - ai.shadow_ai
logsource:
  category: process_creation
  product: any
detection:
  selection_cmdline:
    CommandLine|contains:
      - 'continue.server'
      - 'continue-extension'
      - '.continue'
      - 'Continue.continue'
  condition: selection_cmdline
fields:
  - Image
  - CommandLine
  - ProcessId
  - User
  - ParentImage
  - ParentCommandLine
falsepositives:
  - Legitimate Continue AI extension usage
  - Development environments with Continue extension
level: medium
