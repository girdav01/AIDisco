title: LibreChat Environment Variables
id: 12345678-1234-5678-9abc-123456789045
status: experimental
description: >
  Detects LibreChat environment variable configuration in process command
  lines. LibreChat uses standard API key variables (OPENAI_API_KEY,
  ANTHROPIC_API_KEY, etc.) which are already covered by generic AI API key
  detection rules. This rule focuses on LibreChat-specific configuration
  patterns.
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.discovery
  - attack.t1082
  - ai.framework
  - ai.shadow_ai
logsource:
  category: process_creation
  product: any
detection:
  selection_librechat_config:
    CommandLine|contains:
      - 'ALLOW_REGISTRATION'
      - 'ALLOW_SOCIAL_LOGIN'
      - 'ENDPOINTS'
      - 'danny-avila/librechat'
  selection_librechat_specific:
    CommandLine|contains|all:
      - 'librechat'
  condition: selection_librechat_config or selection_librechat_specific
fields:
  - Image
  - CommandLine
  - User
falsepositives:
  - Legitimate LibreChat configuration
  - Development environment setup
  - Generic API key variables (OPENAI_API_KEY, etc.) are covered by separate rules
level: low
