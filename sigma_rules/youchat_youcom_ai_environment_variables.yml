title: YouChat/You.com AI Environment Variables
id: 12345678-1234-5678-9abc-123456789036
status: experimental
description: Detects You.com AI API key references in process command lines
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.discovery
  - attack.t1082
  - ai.framework
  - ai.shadow_ai
logsource:
  category: process_creation
  product: any
detection:
  selection_api_key:
    CommandLine|contains:
      - 'YOU_API_KEY'
  condition: selection_api_key
fields:
  - Image
  - CommandLine
  - User
falsepositives:
  - Legitimate You.com API configuration
  - Development environment setup
level: low
