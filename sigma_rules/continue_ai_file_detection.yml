title: Continue AI File Detection
id: 12345678-1234-5678-9abc-123456789017
status: experimental
description: Detects Continue AI coding assistant file system activity and configuration.
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.persistence
  - attack.t1547
  - ai.framework
  - ai.shadow_ai
logsource:
  category: file_event
  product: any
detection:
  selection_paths:
    TargetFilename|contains:
      - '\.continue\'
      - '\.continue/'
      - '/.continue/'
  condition: selection_paths
fields:
  - TargetFilename
  - ProcessName
  - User
falsepositives:
  - Legitimate Continue AI installation
  - Development tool updates
level: medium
