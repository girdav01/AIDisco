title: NVIDIA ChatRTX (formerly Chat with RTX) LLM Software Detection
id: 12345678-1234-5678-9abc-123456789061
status: experimental
description: |
  Detects NVIDIA ChatRTX (renamed from "Chat with RTX" in March 2024) desktop
  application. ChatRTX is a Windows-only demo app that runs local LLMs accelerated
  by NVIDIA RTX GPUs using TensorRT-LLM. It was deprecated by NVIDIA in January
  2026. The application installs to C:\Program Files\NVIDIA\ChatRTX and runs as
  a local web server with a Gradio interface.
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.execution
  - attack.t1059
  - attack.t1082
  - ai.framework
  - ai.shadow_ai
references:
  - https://www.nvidia.com/en-us/ai-on-rtx/chatrtx/
logsource:
  category: process_creation
  product: windows
detection:
  selection_chatrtx:
    Image|endswith:
      - '\ChatRTX.exe'
      - '\app_chatrtx.exe'
  selection_legacy:
    Image|endswith:
      - '\ChatWithRTX.exe'
      - '\app_chatwithrtx.exe'
  selection_commands:
    CommandLine|contains:
      - 'ChatRTX'
      - 'ChatWithRTX'
      - 'chat_with_rtx'
  condition: selection_chatrtx or selection_legacy or selection_commands
falsepositives:
  - Legitimate NVIDIA ChatRTX usage for authorized AI testing
level: medium
fields:
  - Image
  - CommandLine
  - User
  - ParentImage
