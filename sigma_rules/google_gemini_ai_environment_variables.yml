title: Google Gemini AI Environment Variables
id: 12345678-1234-5678-9abc-123456789027
status: experimental
description: Detects Google Gemini AI API key references in process command lines
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.discovery
  - attack.t1082
  - ai.framework
  - ai.shadow_ai
logsource:
  category: process_creation
  product: any
detection:
  selection_api_keys:
    CommandLine|contains:
      - 'GOOGLE_API_KEY'
      - 'GEMINI_API_KEY'
  condition: selection_api_keys
fields:
  - Image
  - CommandLine
  - User
falsepositives:
  - Legitimate Google Gemini AI configuration
  - Other Google service API key usage
  - Development environment setup
level: low
