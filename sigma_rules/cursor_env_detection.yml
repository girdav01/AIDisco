title: Cursor AI Code Editor Environment Variables
id: 12345678-1234-5678-9abc-123456789006
status: experimental
description: Detects Cursor AI-powered code editor environment variable configuration on command line.
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.discovery
  - attack.t1082
  - ai.framework
  - ai.shadow_ai
logsource:
  category: process_creation
  product: any
detection:
  selection_cmdline:
    CommandLine|contains:
      - 'CURSOR_'
  condition: selection_cmdline
fields:
  - Image
  - CommandLine
  - User
falsepositives:
  - Legitimate Cursor configuration
  - Development environment setup
  - AI coding assistant configuration
level: low
