title: Text Generation WebUI (Oobabooga) File Detection
id: 12345678-1234-5678-9abc-123456789050
status: experimental
description: >
  Detects text-generation-webui (Oobabooga) file system activity. This is a
  Python web application typically cloned from GitHub. Detection targets the
  project directory structure and its models subdirectory.
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.persistence
  - attack.t1547
  - ai.framework
  - ai.shadow_ai
logsource:
  category: file_event
  product: any
detection:
  selection_project_dir:
    TargetFilename|contains:
      - '/text-generation-webui/'
      - '\\text-generation-webui\\'
  selection_models:
    TargetFilename|contains:
      - 'text-generation-webui/models'
      - 'text-generation-webui\\models'
  selection_oobabooga:
    TargetFilename|contains:
      - '/oobabooga/'
      - '\\oobabooga\\'
  condition: selection_project_dir or selection_models or selection_oobabooga
fields:
  - TargetFilename
  - ProcessName
  - User
falsepositives:
  - Legitimate text-generation-webui installation
  - Development environments
level: medium
