title: ChatGPT Desktop LLM Software Detection
id: 12345678-1234-5678-9abc-123456789019
status: experimental
description: Detects ChatGPT desktop application installation and usage on Windows and macOS
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.execution
  - attack.t1059
  - attack.t1071.001
  - ai.framework
  - ai.shadow_ai
logsource:
  category: process_creation
  product: any
detection:
  selection_image_windows:
    Image|endswith:
      - '\ChatGPT.exe'
  selection_image_macos:
    Image|endswith:
      - '/ChatGPT'
  selection_cmdline:
    CommandLine|contains:
      - 'ChatGPT.exe'
      - 'ChatGPT.app'
  condition: selection_image_windows or selection_image_macos or selection_cmdline
fields:
  - Image
  - CommandLine
  - ProcessId
  - User
  - ParentImage
  - ParentCommandLine
falsepositives:
  - Legitimate ChatGPT desktop usage
  - Development environments
level: medium
