title: Poe AI LLM Software Detection
id: 12345678-1234-5678-9abc-123456789031
status: experimental
description: Detects Poe AI (by Quora) desktop application installation and usage on Windows and macOS
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.execution
  - attack.t1059
  - attack.t1071.001
  - ai.framework
  - ai.shadow_ai
logsource:
  category: process_creation
  product: any
detection:
  selection_image_windows:
    Image|endswith:
      - '\Poe.exe'
  selection_image_macos:
    Image|endswith:
      - '/Poe'
  selection_cmdline:
    CommandLine|contains:
      - 'Poe.exe'
      - 'Poe.app'
  condition: selection_image_windows or selection_image_macos or selection_cmdline
fields:
  - Image
  - CommandLine
  - ProcessId
  - User
  - ParentImage
  - ParentCommandLine
falsepositives:
  - Legitimate Poe AI usage
  - Path of Exile game (similar naming may cause false positives)
  - Development environments
level: medium
