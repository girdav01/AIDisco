title: AI API Key Environment Variable Detection
id: 12345678-1234-5678-9abc-123456789082
status: experimental
description: |
  Detects environment variables containing API keys, tokens, or credentials for
  AI/LLM service providers. The presence of these variables indicates that AI API
  access has been configured on the system, potentially as part of Shadow AI usage.
  Covers all major providers: OpenAI, Anthropic, Google AI, Mistral, Groq, Cohere,
  Together, Replicate, Fireworks, DeepSeek, xAI, Stability, Perplexity, HuggingFace,
  AI21, Azure OpenAI, AWS Bedrock, and others.
author: AI Discovery Security Team
date: 2025/01/15
modified: 2025/02/09
tags:
  - attack.credential_access
  - attack.t1552.001
  - attack.t1082
  - ai.api_provider
  - ai.shadow_ai
logsource:
  category: process_creation
  product: any
detection:
  selection_openai:
    CommandLine|contains:
      - 'OPENAI_API_KEY'
      - 'OPENAI_ORG_ID'
      - 'OPENAI_ORGANIZATION'
      - 'OPENAI_API_BASE'
      - 'OPENAI_API_TYPE'
      - 'OPENAI_API_VERSION'
      - 'OPENAI_BASE_URL'
      - 'OPENAI_PROJECT_ID'
  selection_anthropic:
    CommandLine|contains:
      - 'ANTHROPIC_API_KEY'
      - 'ANTHROPIC_BASE_URL'
      - 'ANTHROPIC_AUTH_TOKEN'
      - 'ANTHROPIC_API_URL'
      - 'CLAUDE_API_KEY'
  selection_google:
    CommandLine|contains:
      - 'GOOGLE_API_KEY'
      - 'GOOGLE_APPLICATION_CREDENTIALS'
      - 'GOOGLE_CLOUD_PROJECT'
      - 'GOOGLE_GENAI_API_KEY'
      - 'GEMINI_API_KEY'
      - 'VERTEX_AI_PROJECT'
      - 'VERTEX_AI_LOCATION'
  selection_mistral:
    CommandLine|contains:
      - 'MISTRAL_API_KEY'
      - 'MISTRAL_API_URL'
  selection_groq:
    CommandLine|contains:
      - 'GROQ_API_KEY'
      - 'GROQ_API_URL'
  selection_cohere:
    CommandLine|contains:
      - 'COHERE_API_KEY'
      - 'CO_API_KEY'
      - 'COHERE_API_URL'
  selection_together:
    CommandLine|contains:
      - 'TOGETHER_API_KEY'
      - 'TOGETHER_API_BASE'
      - 'TOGETHERAI_API_KEY'
  selection_replicate:
    CommandLine|contains:
      - 'REPLICATE_API_TOKEN'
      - 'REPLICATE_API_KEY'
  selection_fireworks:
    CommandLine|contains:
      - 'FIREWORKS_API_KEY'
      - 'FIREWORKS_AI_API_KEY'
      - 'FIREWORKS_API_BASE'
  selection_deepseek:
    CommandLine|contains:
      - 'DEEPSEEK_API_KEY'
      - 'DEEPSEEK_API_BASE'
      - 'DEEPSEEK_BASE_URL'
  selection_xai:
    CommandLine|contains:
      - 'XAI_API_KEY'
      - 'GROK_API_KEY'
  selection_stability:
    CommandLine|contains:
      - 'STABILITY_API_KEY'
      - 'STABILITY_HOST'
  selection_perplexity:
    CommandLine|contains:
      - 'PERPLEXITY_API_KEY'
      - 'PPLX_API_KEY'
  selection_huggingface:
    CommandLine|contains:
      - 'HF_TOKEN'
      - 'HF_API_TOKEN'
      - 'HUGGING_FACE_HUB_TOKEN'
      - 'HUGGINGFACE_API_KEY'
      - 'HF_HOME'
      - 'HF_HUB_CACHE'
      - 'TRANSFORMERS_CACHE'
  selection_ai21:
    CommandLine|contains:
      - 'AI21_API_KEY'
      - 'AI21_API_URL'
  selection_azure_openai:
    CommandLine|contains:
      - 'AZURE_OPENAI_API_KEY'
      - 'AZURE_OPENAI_ENDPOINT'
      - 'AZURE_OPENAI_API_VERSION'
      - 'AZURE_OPENAI_DEPLOYMENT'
      - 'AZURE_OPENAI_AD_TOKEN'
      - 'AZURE_API_KEY'
      - 'AZURE_API_BASE'
  selection_aws_bedrock:
    CommandLine|contains:
      - 'AWS_BEDROCK_RUNTIME_ENDPOINT'
      - 'AWS_DEFAULT_REGION'
      - 'BEDROCK_ENDPOINT_URL'
      - 'BEDROCK_ASSUME_ROLE'
  selection_sambanova:
    CommandLine|contains:
      - 'SAMBANOVA_API_KEY'
      - 'SAMBANOVA_URL'
  selection_cerebras:
    CommandLine|contains:
      - 'CEREBRAS_API_KEY'
  selection_voyage:
    CommandLine|contains:
      - 'VOYAGE_API_KEY'
  selection_writer:
    CommandLine|contains:
      - 'WRITER_API_KEY'
      - 'WRITER_ORG_ID'
  selection_reka:
    CommandLine|contains:
      - 'REKA_API_KEY'
  selection_aleph_alpha:
    CommandLine|contains:
      - 'ALEPH_ALPHA_API_KEY'
      - 'AA_TOKEN'
  selection_inflection:
    CommandLine|contains:
      - 'INFLECTION_API_KEY'
  selection_anyscale:
    CommandLine|contains:
      - 'ANYSCALE_API_KEY'
      - 'ANYSCALE_API_BASE'
  selection_databricks:
    CommandLine|contains:
      - 'DATABRICKS_TOKEN'
      - 'DATABRICKS_HOST'
  condition: selection_openai or selection_anthropic or selection_google or selection_mistral or selection_groq or selection_cohere or selection_together or selection_replicate or selection_fireworks or selection_deepseek or selection_xai or selection_stability or selection_perplexity or selection_huggingface or selection_ai21 or selection_azure_openai or selection_aws_bedrock or selection_sambanova or selection_cerebras or selection_voyage or selection_writer or selection_reka or selection_aleph_alpha or selection_inflection or selection_anyscale or selection_databricks
fields:
  - CommandLine
  - Image
  - User
falsepositives:
  - Authorized development environments with AI API access
  - CI/CD systems with approved AI integrations
  - Managed service accounts for AI operations
level: high
