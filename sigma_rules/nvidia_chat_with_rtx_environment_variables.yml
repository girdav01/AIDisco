title: NVIDIA ChatRTX (formerly Chat with RTX) Environment Detection
id: 12345678-1234-5678-9abc-123456789063
status: experimental
description: |
  Detects commands referencing NVIDIA ChatRTX environment configuration.
  ChatRTX does not use well-known environment variables; this rule detects
  command-line references to ChatRTX configuration or TensorRT-LLM engine
  paths commonly associated with ChatRTX. Deprecated by NVIDIA in January 2026.
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.discovery
  - attack.t1082
  - ai.framework
  - ai.shadow_ai
logsource:
  category: process_creation
  product: windows
detection:
  selection_commands:
    CommandLine|contains:
      - 'CHATRTX'
      - 'CHAT_RTX'
      - 'ChatRTX'
  condition: selection_commands
falsepositives:
  - NVIDIA development and testing environments
level: low
fields:
  - Image
  - CommandLine
  - User
