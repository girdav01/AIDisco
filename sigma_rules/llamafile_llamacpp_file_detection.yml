title: Llamafile/llama.cpp File Detection
id: 12345678-1234-5678-9abc-123456789056
status: experimental
description: >
  Detects Llamafile and llama.cpp file system activity. Llamafile uses
  single-file executables with the .llamafile extension. llama.cpp projects
  are typically compiled from source or downloaded as pre-built binaries.
  These tools have no standard install location. Detection targets the
  .llamafile extension and llama.cpp build/binary artifacts.
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.persistence
  - attack.t1547
  - ai.framework
  - ai.shadow_ai
logsource:
  category: file_event
  product: any
detection:
  selection_llamafile_ext:
    TargetFilename|endswith:
      - '.llamafile'
      - '.llamafile.exe'
  selection_llamacpp_dir:
    TargetFilename|contains:
      - '/llama.cpp/'
      - '\\llama.cpp\\'
      - '/llama-cpp/'
      - '\\llama-cpp\\'
  selection_llamacpp_binaries:
    TargetFilename|endswith:
      - '/llama-cli'
      - '/llama-server'
      - '/llama-quantize'
      - '\llama-cli.exe'
      - '\llama-server.exe'
      - '\llama-quantize.exe'
  condition: selection_llamafile_ext or selection_llamacpp_dir or selection_llamacpp_binaries
fields:
  - TargetFilename
  - ProcessName
  - User
falsepositives:
  - Legitimate Llamafile/llama.cpp installation
  - AI/ML development and research
level: medium
