title: Claude AI LLM Software Detection
id: 12345678-1234-5678-9abc-123456789022
status: experimental
description: Detects Claude AI applications (Claude Desktop, Claude Code CLI) installation and usage
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.execution
  - attack.t1059
  - attack.t1071.001
  - ai.framework
  - ai.shadow_ai
logsource:
  category: process_creation
  product: any
detection:
  selection_image_windows:
    Image|endswith:
      - '\Claude.exe'
  selection_image_macos:
    Image|endswith:
      - '/Claude'
  selection_cmdline:
    CommandLine|contains:
      - 'Claude.exe'
      - 'Claude.app'
      - 'claude '
  condition: selection_image_windows or selection_image_macos or selection_cmdline
fields:
  - Image
  - CommandLine
  - ProcessId
  - User
  - ParentImage
  - ParentCommandLine
falsepositives:
  - Legitimate Claude AI usage
  - Claude Code CLI for development
level: medium
