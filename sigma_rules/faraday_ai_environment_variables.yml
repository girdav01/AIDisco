title: Backyard AI (formerly Faraday) Environment Detection
id: 12345678-1234-5678-9abc-123456789060
status: experimental
description: |
  Detects commands referencing Backyard AI (formerly Faraday) environment variables
  or configuration. Note that Backyard AI does not use well-known environment
  variables; this rule detects command-line references to the software configuration.
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.discovery
  - attack.t1082
  - ai.framework
  - ai.shadow_ai
logsource:
  category: process_creation
  product: any
detection:
  selection_commands:
    CommandLine|contains:
      - 'BACKYARD_AI'
      - 'BACKYARDAI_'
  condition: selection_commands
falsepositives:
  - Development environments referencing Backyard AI configuration
level: low
fields:
  - Image
  - CommandLine
  - User
