title: Chatbox AI Chat Application Process Detection
id: 12345678-1234-5678-9abc-123456789007
status: experimental
description: Detects Chatbox AI desktop chat client process execution. Chatbox is an Electron-based desktop AI chat application.
author: AI Discovery Security Team
date: 2025/01/02
modified: 2026/02/10
tags:
  - attack.execution
  - attack.t1059
  - attack.t1071.001
  - ai.framework
  - ai.shadow_ai
logsource:
  category: process_creation
  product: any
detection:
  selection_image:
    Image|endswith:
      - '\Chatbox.exe'
      - '\chatbox.exe'
      - '/chatbox'
      - '/Chatbox'
  selection_cmdline:
    CommandLine|contains:
      - 'Chatbox.exe'
      - 'chatbox.exe'
      - 'Chatbox.app'
  condition: selection_image or selection_cmdline
fields:
  - Image
  - CommandLine
  - ProcessId
  - User
  - ParentImage
  - ParentCommandLine
falsepositives:
  - Legitimate Chatbox AI chat application usage
  - AI chat sessions
level: medium
