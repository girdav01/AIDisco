title: LM Studio LLM Software Detection
id: 12345678-1234-5678-9abc-123456789077
status: experimental
description: |
  Detects LM Studio local LLM software processes. LM Studio is an Electron-based
  desktop application for running local LLMs on Windows, macOS, and Linux. As of
  v0.4.0 (Jan 2026) it includes a headless daemon (llmster) and CLI tool (lms) for
  server management. It serves a local OpenAI-compatible API on port 1234.
  Data is stored in ~/.cache/lm-studio (Linux/macOS) or %LOCALAPPDATA%\LM-Studio (Windows).
author: AI Discovery Security Team
date: 2024/08/30
modified: 2026/02/10
tags:
  - attack.execution
  - attack.t1059
  - attack.t1082
  - ai.framework
  - ai.shadow_ai
references:
  - https://lmstudio.ai/
logsource:
  category: process_creation
  product: any
detection:
  selection_gui:
    Image|endswith:
      - '\LM Studio.exe'
      - '/LM Studio'
  selection_daemon:
    Image|endswith:
      - '\llmster.exe'
      - '/llmster'
  selection_lms_commands:
    CommandLine|contains:
      - 'lms server'
      - 'lms load'
      - 'lms unload'
      - 'lms ls'
      - 'lms get'
      - 'lms create'
      - 'lms status'
      - 'lms version'
      - 'lms log'
  selection_lmstudio:
    CommandLine|contains:
      - 'lmstudio'
      - 'lm-studio'
      - 'LMStudio'
  condition: selection_gui or selection_daemon or selection_lms_commands or selection_lmstudio
falsepositives:
  - Legitimate use of LM Studio for authorized AI development
  - IT-approved local LLM deployments
level: medium
fields:
  - Image
  - CommandLine
  - User
  - ParentImage
