title: GPT4All LLM Software Detection
id: 12345678-1234-5678-9abc-123456789078
status: experimental
description: |
  Detects GPT4All local LLM software processes and commands. GPT4All is a desktop
  application by Nomic AI for running local LLMs on Windows, macOS, and Linux.
  It provides a chat interface and a local API server on port 4891. Models and data
  are stored in %LOCALAPPDATA%\nomic.ai\GPT4All (Windows), ~/Library/Application
  Support/nomic.ai/GPT4All (macOS), or ~/.local/share/nomic.ai/GPT4All (Linux).
  The Python SDK (gpt4all) provides programmatic access.
author: AI Discovery Security Team
date: 2024/08/30
modified: 2026/02/10
tags:
  - attack.execution
  - attack.t1059
  - attack.t1082
  - ai.framework
  - ai.shadow_ai
references:
  - https://gpt4all.io/
  - https://github.com/nomic-ai/gpt4all
logsource:
  category: process_creation
  product: any
detection:
  selection_process:
    Image|endswith:
      - '\GPT4All.exe'
      - '\gpt4all.exe'
      - '/gpt4all'
  selection_chat_binary:
    Image|contains:
      - 'GPT4All'
      - 'gpt4all'
    Image|endswith:
      - '\chat.exe'
      - '/chat'
  selection_commands:
    CommandLine|contains:
      - 'gpt4all'
      - 'GPT4All'
  condition: selection_process or selection_chat_binary or selection_commands
falsepositives:
  - Legitimate use of GPT4All for authorized AI development
  - IT-approved local LLM deployments
level: medium
fields:
  - Image
  - CommandLine
  - User
  - ParentImage
